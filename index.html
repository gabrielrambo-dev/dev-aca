    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at top left,#1e1b4b 0,#080d1b 36%,#060913 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.55}.app{min-height:100vh;padding-bottom:92px}.top{position:sticky;top:0;z-index:20;padding:12px 14px;background:rgba(8,13,27,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}.brand{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand-left{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;font-weight:950;background:linear-gradient(135deg,var(--brand),#06b6d4);box-shadow:0 12px 30px rgba(124,58,237,.35)}h1,h2,h3,p{margin-top:0}.brand h1{font-size:1.05rem;margin:0}.brand small,.muted{color:var(--muted);font-size:.78rem}.main{padding:14px;max-width:980px;margin:auto}.card{background:linear-gradient(180deg,rgba(22,34,61,.96),rgba(16,26,49,.96));border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}.hero{padding:20px;background:linear-gradient(135deg,rgba(124,58,237,.28),rgba(34,197,94,.12)),var(--panel)}.hero h2{font-size:1.7rem;line-height:1.12;margin:12px 0}.hero p,.card p,.lesson li{color:#d4dbeb}.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;color:#dce5ff;background:rgba(255,255,255,.05);font-size:.78rem;font-weight:800}.grid{display:grid;grid-template-columns:1fr;gap:12px}.section-title{display:flex;align-items:end;justify-content:space-between;margin:18px 2px 10px}.section-title h2{font-size:1.05rem;margin:0}.section-title span{color:var(--muted);font-size:.78rem}.course-card{cursor:pointer}.course-top{display:flex;justify-content:space-between;align-items:center}.course-icon{width:48px;height:48px;border-radius:17px;display:grid;place-items:center;font-size:1.45rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}.progress{height:10px;border-radius:999px;background:#0a1020;border:1px solid rgba(255,255,255,.08);overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#06b6d4,var(--brand2));width:0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px;text-align:center}.stat strong{display:block;font-size:1.15rem}.stat span{color:var(--muted);font-size:.75rem}.btn,.pill,.round{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:var(--text);padding:11px 13px;border-radius:14px;font-weight:850;cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--brand),#2563eb);border-color:transparent}.full{width:100%}.quick{display:grid;grid-template-columns:1fr;gap:10px}.quick-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:var(--text);padding:14px;border-radius:18px;text-align:left}.quick-card b{display:block}.quick-card span{display:block;color:var(--muted);font-size:.82rem}.bottom-nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;border:1px solid rgba(255,255,255,.12);border-radius:22px;background:rgba(10,16,32,.92);backdrop-filter:blur(18px);box-shadow:0 20px 50px rgba(0,0,0,.45)}.bottom-nav button{border:0;border-radius:15px;background:transparent;color:var(--muted);padding:10px 4px;font-size:.72rem;font-weight:900}.bottom-nav button.active{background:linear-gradient(135deg,var(--brand),#2563eb);color:white}.lesson-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}.lesson-head{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.lesson h2{font-size:1.55rem;line-height:1.15}.lesson h3{margin:24px 0 8px;font-size:1.05rem}.learn-       lesson('java-1','Classe main','Básico',40,'Entender a porta de entrada de um programa Java.', ['Em Java, tudo fica dentro de classes. Para iniciar um programa simples, usamos o método main.','System.out.println mostra texto no console.','Java é mais rígido que JavaScript: tipos e estrutura importam bastante.'], 'Java gosta de organização explícita: classe, método e comandos.', ['Crie a classe.','Crie o método main.','Escreva comandos dentro dele.','Compile e rode.'], 'public class App {\n  public static void main(String[] args) {\n    System.out.println("Olá Java");\n  }\n}', [['public class App','Define a classe chamada App.'],['main','Ponto de entrada do programa.'],['System.out.println','Mostra texto no console.']], ['Saber estrutura da classe.','Entender main.','Mostrar saída no console.'], ['Nome do arquivo diferente da classe pública.','Esquecer chaves.','Esquecer ponto e vírgula.'], 'Crie um programa Java que mostre seu nome.', ['public class','main','System.out.println'], 'Confira chaves e ponto e vírgula.', 'Qual método inicia um programa Java?', ['main','style','querySelector'], 0, 'O método main é a entrada do programa Java.')
    ]}]}
  ],
  plan:[
    {day:'Dia 1',focus:'Lógica',task:'Faça 2 aulas e escreva o que é entrada, processamento e saída.'},
    {day:'Dia 2',focus:'HTML',task:'Monte uma página simples com estrutura correta.'},
    {day:'Dia 3',focus:'CSS',task:'Transforme a página em layout mobile com cards.'},
    {day:'Dia 4',focus:'JavaScript',task:'Coloque botão que altera texto e salva dado.'},
    {day:'Dia 5',focus:'Revisão',task:'Refaça os testes que errou e melhore um desafio.'}
  ],
  challenges:[
    {course:'logica',level:'Básico',title:'Calculadora de notas',brief:'Receba 2 notas e diga se passou.',requirements:['Criar variáveis de nota','Calcular média','Usar if/else'],rubric:['Funciona com nota baixa e alta','Mostra mensagem clara','Código explicado']},
    {course:'html',level:'Básico',title:'Página de perfil',brief:'Crie uma página com nome, bio, links e imagem.',requirements:['Usar header, main e section','Ter h1 e parágrafo','Ter link'],rubric:['Estrutura semântica','Texto organizado','Funciona no celular']},
    {course:'css',level:'Intermediário',title:'Tela mobile de curso',brief:'Crie cards de aulas responsivos.',requirements:['Usar grid','Ter botões grandes','Usar media query'],rubric:['Boa leitura','Sem scroll lateral','Visual consistente']},
    {course:'js',level:'Básico',title:'Lista de tarefas',brief:'Adicionar tarefas em uma lista.',requirements:['Input','Botão','Array ou DOM'],rubric:['Adiciona item','Não quebra com texto vazio','Código organizado']},
    {course:'backend',level:'Básico',title:'Desenhar API',brief:'Planeje rotas de um app de estudos.',requirements:['GET /aulas','POST /progresso','Resposta JSON'],rubric:['Rotas claras','Dados bem nomeados','Entrada e saída definidas']},
    {course:'java',level:'Básico',title:'Programa de apresentação',brief:'Mostrar nome, idade e objetivo.',requirements:['Classe pública','main','println'],rubric:['Compila','Tem ponto e vírgula','Mensagem clara']}
  ]
};
function lesson(id,title,level,minutes,objective,explain,mental,steps,code,lines,checkpoints,mistakes,practice,must,tip,q,options,answer,why){return{id,title,level,minutes,objective,explain,mental,steps,code,lines,checkpoints,mistakes,practice,starter:code,validator:{must,tip},quiz:{q,options,answer,why}}}
const $=s=>document.querySelector(s);const esc=(s='')=>String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const STORE={done:'cs_done_v3',notes:'cs_notes_v3',code:'cs_code_v3',quiz:'cs_quiz_v3',last:'cs_last_v3'};
const load=(k,f={})=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch{return f}};const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let done=load(STORE.done),notes=load(STORE.notes),codeStore=load(STORE.code),quizStore=load(STORE.quiz),state={view:'home',course:null,lesson:null,filter:'all',search:''};
const courses=()=>DATA.courses;const lessonsOf=c=>c.modules.flatMap(m=>m.lessons.map(l=>({...l,module:m.title,courseId:c.id,courseName:c.name,icon:c.icon})));const allLessons=()=>courses().flatMap(lessonsOf);const courseBy=id=>courses().find(c=>c.id===id)||courses()[0];const pct=(a,b)=>b?Math.round(a/b*100):0;const doneCount=()=>allLessons().filter(l=>done[l.id]).length;
function readHash(){const h=location.hash.slice(1).split('/').filter(Boolean);state.view=h[0]||'home';state.course=h[1]||state.course;state.lesson=h[2]||state.lesson}function route(v,c=state.course,l=state.lesson){state.view=v;state.course=c;state.lesson=l;location.hash=[v,c,l].filter(Boolean).join('/');render();setTimeout(()=>scrollTo(0,0),0)}
function openCourse(id){const c=courseBy(id);const first=lessonsOf(c).find(l=>!done[l.id])||lessonsOf(c)[0];route('course',id,first.id)}function currentLesson(){const c=courseBy(state.course);return lessonsOf(c).find(l=>l.id===state.lesson)||lessonsOf(c)[0]}
function render(){try{const app=$('#app');app.className='app';app.innerHTML=top()+`<main class="main">${body()}</main>`+bottom()+`<div class="toast"></div>`}catch(e){$('#app').innerHTML=`<main class="main"><div class="error-card"><h2>Erro no app</h2><p>${esc(e.message)}</p><button class="btn primary" onclick="localStorage.clear();location.href=location.pathname">Limpar dados e reiniciar</button></div></main>`}}
function top(){const t=allLessons().length,d=doneCount();return`<header class="top"><div class="brand"><div class="brand-left"><div class="logo">CS</div><div><h1>CodeStudy Pro</h1><small>${d}/${t} aulas concluídas • ${pct(d,t)}%</small></div></div><button class="round" onclick="localStorage.clear();location.reload()">Reset</button></div></header>`}
function bottom(){return`<nav class="bottom-nav">${[['home','Cursos'],['plan','Plano'],['quiz','Prova'],['challenges','Desafios'],['profile','Perfil']].map(([v,t])=>`<button class="${state.view===v?'active':''}" onclick="route('${v}')">${t}</button>`).join('')}</nav>`}
function body(){if(state.view==='course')return courseView();if(state.view==='plan')return planView();if(state.view==='quiz')return quizView();if(state.view==='challenges')return challengesView();if(state.view==='profile')return profileView();if(state.view==='search')return searchView();return homeView()}
function homeView(){const t=allLessons().length,d=doneCount(),lastId=localStorage.getItem(STORE.last),last=lastId?allLessons().find(l=>l.id===lastId):null,next=allLessons().find(l=>!done[l.id])||allLessons()[0];return`<section class="hero card"><span class="badge">App estável para APK</span><h2>Aprenda programação na prática.</h2><p>Explicação curta, exemplo comentado, prática guiada, teste rápido e desafios. Sem tela vazia: tudo está dentro de um único arquivo.</p><div class="stats"><div class="stat"><strong>${pct(d,t)}%</strong><span>progresso</span></div><div class="stat"><strong>${d}</strong><span>feitas</span></div><div class="stat"><strong>${t-d}</strong><span>faltam</span></div></div><div class="quick"><button class="quick-card" onclick="${last?`route('course','${last.courseId}','${last.id}')`:`openCourse('${next.courseId}')`}"><b>Continuar</b><span>${last?esc(last.courseName+' • '+last.title):'Começar agora'}</span></button><button class="quick-card" onclick="route('search')"><b>Buscar aula</b><span>HTML, CSS, JS, Java...</span></button></div></section><div class="section-title"><h2>Cursos</h2><span>ordem recomendada</span></div><section class="grid">${courses().map(courseCard).join('')}</section>`}
function courseCard(c){const list=lessonsOf(c),d=list.filter(l=>done[l.id]).length,p=pct(d,list.length);return`<article class="card course-card" onclick="openCourse('${c.id}')"><div class="course-top"><div class="course-icon">${c.icon}</div><span class="badge">${p}%</span></div><h3>${esc(c.name)}</h3><p>${esc(c.desc)}</p><div class="progress"><span style="width:${p}%"></span></div><small class="muted">${d}/${list.length} aulas</small><br><br><button class="btn primary full">Estudar</button></article>`}
function courseView(){const c=courseBy(state.course),l=currentLesson();localStorage.setItem(STORE.last,l.id);const list=lessonsOf(c),i=list.findIndex(x=>x.id===l.id);return`<section class="course-layout"><aside class="desktop-sticky"><div class="lesson-top"><button class="btn" onclick="route('home')">Voltar</button><div><b>${c.icon} ${esc(c.name)}</b><br><small class="muted">Aula ${i+1}/${list.length}</small></div></div><div class="card lesson-list">${list.map(x=>`<button class="lesson-btn ${x.id===l.id?'active':''} ${done[x.id]?'done':''}" onclick="route('course','${c.id}','${x.id}')">${done[x.id]?'✓ ':''}${esc(x.title)}</button>`).join('')}</div></aside><article class="lesson card">${lessonHtml(l,c,i,list)}</article></section>`}
function lessonHtml(l,c,i,list){const prev=list[Math.max(0,i-1)],next=list[Math.min(list.length-1,i+1)];return`<div class="lesson-head"><span class="badge">${esc(l.level)} • ${l.minutes} min</span><span class="badge">${esc(l.module)}</span></div><h2>${esc(l.title)}</h2><div class="progress"><span style="width:${pct(i+1,list.length)}%"></span></div><h3>Objetivo</h3><div class="learn-card"><strong>O que você precisa aprender</strong><p>${esc(l.objective)}</p></div><h3>Explicação de verdade</h3>${l.explain.map(p=>`<p>${esc(p)}</p>`).join('')}<div class="learn-card"><strong>Modelo mental</strong><p>${esc(l.mental)}</p></div><h3>Passo a passo</h3><div class="steps">${l.steps.map(s=>`<div class="step">${esc(s)}</div>`).join('')}</div><h3>Exemplo prático</h3><pre class="code">${esc(l.code)}</pre><h3>O que cada parte faz</h3><div class="line-table">${l.lines.map(([a,b])=>`<div class="line"><b>${esc(a)}</b><span>${esc(b)}</span></div>`).join('')}</div><h3>Checklist de domínio</h3><ul>${l.checkpoints.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h3>Erros comuns</h3><ul>${l.mistakes.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>${labHtml(l)}${quizOneHtml(l)}<h3>Anotação</h3><textarea class="note" oninput="saveNote('${l.id}',this.value)" placeholder="Explique com suas palavras.">${esc(notes[l.id]||'')}</textarea><div class="quick" style="margin-top:12px"><button class="btn" onclick="route('course','${c.id}','${prev.id}')">Anterior</button><button class="btn" onclick="route('course','${c.id}','${next.id}')">Próxima</button></div><button class="btn primary full" style="margin-top:10px" onclick="finishLesson('${l.id}')">Marcar como concluída</button>`}
function labHtml(l){const val=codeStore[l.id]||l.starter||'';return`<h3>Prática guiada</h3><div class="lab"><p>${esc(l.practice)}</p><textarea id="code-${l.id}" spellcheck="false">${esc(val)}</textarea><button class="btn primary full" style="margin-top:10px" onclick="checkLab('${l.id}')">Corrigir prática</button><div id="fb-${l.id}"></div></div>`}
function quizOneHtml(l){const q=l.quiz,s=quizStore[l.id];return`<h3>Teste rápido</h3><div class="learn-card"><strong>${esc(q.q)}</strong>${q.options.map((o,i)=>`<label class="option"><input type="radio" name="q-${l.id}" value="${i}" ${s==i?'checked':''}> ${esc(o)}</label>`).join('')}<button class="btn" onclick="answerQuiz('${l.id}')">Responder</button><div id="quizfb-${l.id}">${s!==undefined?quizFeedback(l,s):''}</div></div>`}
function quizFeedback(l,i){const ok=Number(i)===l.quiz.answer;return`<div class="feedback ${ok?'good':'bad'}"><b>${ok?'Acertou':'Errou'}</b><p>${esc(l.quiz.why)}</p></div>`}
function saveNote(id,v){notes[id]=v;save(STORE.notes,notes)}function finishLesson(id){done[id]=true;save(STORE.done,done);toast('Aula concluída. Agora pratique mais uma.');render()}function checkLab(id){const l=allLessons().find(x=>x.id===id),txt=$(`#code-${id}`).value;codeStore[id]=txt;save(STORE.code,codeStore);const miss=(l.validator.must||[]).filter(m=>!txt.toLowerCase().includes(m.toLowerCase()));$(`#fb-${id}`).innerHTML=miss.length?`<div class="feedback bad"><b>Faltam ${miss.length} ponto(s)</b><p>${miss.map(esc).join(', ')}</p><p>${esc(l.validator.tip)}</p></div>`:`<div class="feedback good"><b>Boa.</b><p>Seu código contém os pontos principais. Agora explique linha por linha.</p></div>`}
function answerQuiz(id){const l=allLessons().find(x=>x.id===id),el=document.querySelector(`input[name="q-${id}"]:checked`);if(!el){toast('Escolha uma resposta.');return}quizStore[id]=Number(el.value);save(STORE.quiz,quizStore);$(`#quizfb-${id}`).innerHTML=quizFeedback(l,Number(el.value))}
function planView(){return`<section class="card"><span class="badge">Plano rápido</span><h2>Estude sem travar</h2><p>Faça uma aula, pratique, corrija e explique em voz alta. Não pule a prática.</p></section><section class="grid" style="margin-top:12px">${DATA.plan.map(p=>`<article class="card"><span class="badge">${esc(p.day)}</span><h3>${esc(p.focus)}</h3><p>${esc(p.task)}</p></article>`).join('')}</section>`}
function quizView(){return`<section class="card"><span class="badge">Prova geral</span><h2>Teste sem olhar a aula</h2><p>Errou? Volte na explicação e refaça a prática.</p></section><section>${allLessons().map(l=>`<div class="card" style="margin-top:12px"><b>${esc(l.courseName)} • ${esc(l.title)}</b>${quizOneHtml(l)}</div>`).join('')}</section>`}
function challengesView(){const filters=[['all','Todos'],...courses().map(c=>[c.id,c.name])],list=DATA.challenges.filter(x=>state.filter==='all'||x.course===state.filter);return`<section class="card"><span class="badge">Desafios</span><h2>Projetos pequenos</h2><p>É aqui que você aprende de verdade: criando algo e corrigindo.</p><div class="pill-row">${filters.map(([id,t])=>`<button class="pill ${state.filter===id?'active':''}" onclick="state.filter='${id}';render()">${esc(t)}</button>`).join('')}</div></section><section class="grid" style="margin-top:12px">${list.map(c=>`<article class="card"><span class="badge">${esc(c.level)}</span><h3>${esc(c.title)}</h3><p>${esc(c.brief)}</p><b>Requisitos</b><ul>${c.requirements.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><b>Correção</b><ul>${c.rubric.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></article>`).join('')}</section>`}
function profileView(){const t=allLessons().length,d=doneCount();return`<section class="card"><span class="badge">Perfil</span><h2>Progresso local</h2><div class="stats"><div class="stat"><strong>${d}</strong><span>feitas</span></div><div class="stat"><strong>${t-d}</strong><span>faltam</span></div><div class="stat"><strong>${pct(d,t)}%</strong><span>total</span></div></div><button class="btn" onclick="exportData()">Exportar backup</button> <button class="btn" onclick="localStorage.clear();location.reload()">Zerar</button></section><section class="grid" style="margin-top:12px">${courses().map(courseCard).join('')}</section>`}
function searchView(){const q=state.search.toLowerCase(),list=allLessons().filter(l=>(l.title+l.courseName+l.objective).toLowerCase().includes(q));return`<section class="card"><h2>Buscar aula</h2><input class="search" placeholder="Ex: variável, CSS, Java" value="${esc(state.search)}" oninput="state.search=this.value;render()"></section><section class="lesson-list" style="margin-top:12px">${list.map(l=>`<button class="lesson-btn" onclick="route('course','${l.courseId}','${l.id}')"><b>${esc(l.courseName)}</b><br>${esc(l.title)}</button>`).join('')}</section>`}
function exportData(){const blob=new Blob([JSON.stringify({done,notes,codeStore,quizStore},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='codestudy-backup.json';a.click()}function toast(msg){const t=$('.toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
window.addEventListener('hashchange',()=>{readHash();render()});readHash();render();
</script>
</body>
</html>
